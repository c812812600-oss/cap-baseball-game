<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>パワフルキャップ野球</title>

<link rel="stylesheet" href="style.css">

<style>

html,body{

margin:0;

width:100%;

height:100%;

overflow:hidden;

background:#7ec850;

font-family:sans-serif;

}

#game{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

display:block;

}

#loading{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

font-size:40px;

color:white;

font-weight:bold;

text-shadow:0 0 10px black;

}

#hud{

position:absolute;

top:10px;

left:10px;

color:white;

font-size:24px;

background:rgba(0,0,0,.5);

padding:10px;

border-radius:10px;

}

#cross{

position:absolute;

left:50%;

top:50%;

width:40px;

height:40px;

margin-left:-20px;

margin-top:-20px;

pointer-events:none;

}

#line1{

position:absolute;

width:40px;

height:2px;

background:white;

top:19px;

}

#line2{

position:absolute;

width:2px;

height:40px;

background:white;

left:19px;

}

button{

position:absolute;

bottom:20px;

right:20px;

width:120px;

height:60px;

font-size:24px;

}

</style>

</head>

<body>

<div id="loading">

POWERFUL CAP BASEBALL

</div>

<div id="hud">

HOME 0

<br>

AWAY 0

<br>

OUT 0

</div>

<div id="cross">

<div id="line1"></div>

<div id="line2"></div>

</div>

<canvas id="game"></canvas>

<button id="swing">

SWING

</button>

<script type="module" src="main.js"></script>

</body>

</html>
