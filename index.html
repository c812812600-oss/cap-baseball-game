<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パワフルキャップ野球</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ローディング -->
    <div id="loading">
        <h1>⚾ パワフルキャップ野球</h1>
        <p>Loading...</p>
    </div>

    <!-- HUD -->
    <div id="hud">

        <div id="scoreboard">

            <div class="team">

                <span>HOME</span>

                <span id="homeScore">0</span>

            </div>

            <div class="team">

                <span>AWAY</span>

                <span id="awayScore">0</span>

            </div>

        </div>

        <div id="info">

            <div>OUT：<span id="outs">0</span></div>

            <div>INNING：<span id="inning">1</span></div>

        </div>

    </div>

    <!-- 照準 -->
    <div id="crosshair">

        <div class="h"></div>

        <div class="v"></div>

    </div>

    <!-- ゲーム描画 -->
    <canvas id="game"></canvas>

    <!-- PC操作説明 -->
    <div id="guide">

        <h3>操作方法</h3>

        <p>WASD：移動</p>

        <p>SPACE：スイング</p>

        <p>SHIFT：ダッシュ</p>

    </div>

    <!-- スマホ操作 -->
    <div id="mobile">

        <button id="left">◀</button>

        <button id="up">▲</button>

        <button id="down">▼</button>

        <button id="right">▶</button>

        <button id="swing">⚾</button>

    </div>

    <!-- ホームラン表示 -->
    <div id="message"></div>

    <!-- ゲームオーバー画面 -->
    <div id="gameover" class="hidden">

        <h1>GAME SET</h1>

        <button onclick="location.reload()">

            もう一度遊ぶ

        </button>

    </div>

    <!-- JavaScript -->
    <script type="module" src="main.js"></script>

</body>

</html>
